<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Terminal</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width:100%; height:100%;
  background:#1A1A2E;
  overflow:hidden;
  -webkit-tap-highlight-color:transparent;
}

#screen {
  position:absolute;
  top:0; left:0; right:0; bottom:0;
  font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code',
               'Courier New', 'DejaVu Sans Mono', monospace;
  font-size: 13.5px;
  line-height: 1.45;
  color: #E2E8F0;
  background: #1A1A2E;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 10px 8px 8px 8px;
  white-space: pre-wrap;
  word-break: break-all;
  cursor: text;
  -webkit-user-select: text;
  user-select: text;
  transition: bottom 0.15s ease;
}

/* Custom scrollbar */
#screen::-webkit-scrollbar { width: 4px; }
#screen::-webkit-scrollbar-track { background: transparent; }
#screen::-webkit-scrollbar-thumb { background: #3A3A55; border-radius: 2px; }

/* ANSI 16-color classes */
.f0{color:#21262D}.f1{color:#F28B82}.f2{color:#81C995}.f3{color:#FFD966}
.f4{color:#82B4FF}.f5{color:#CF9FFF}.f6{color:#5DD6EB}.f7{color:#E2E8F0}
.f8{color:#555570}.f9{color:#FF8A80}.f10{color:#A8FFB0}.f11{color:#FFE680}
.f12{color:#A0CFFF}.f13{color:#E0BAFF}.f14{color:#80ECFF}.f15{color:#FFFFFF}
.b0{background:#21262D}.b1{background:#F28B82}.b2{background:#81C995}
.b3{background:#FFD966}.b4{background:#82B4FF}.b5{background:#CF9FFF}
.b6{background:#5DD6EB}.b7{background:#E2E8F0}

.bold{font-weight:700}
.dim{opacity:0.45}
.italic{font-style:italic}
.underline{text-decoration:underline}
.blink{animation:blink 1s step-end infinite}
.inverse{filter:invert(100%)}
.strikethrough{text-decoration:line-through}

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* Input line at the bottom of terminal content */
#input-line {
  display: inline;
  white-space: pre-wrap;
  word-break: break-all;
}

.prompt-char { color: #DA7756; }

#cursor {
  display:inline-block;
  width:2px; height:1.1em;
  background:#DA7756;
  animation: cursorBlink 1.2s step-end infinite;
  vertical-align:text-bottom;
  border-radius:1px;
}
@keyframes cursorBlink { 0%,66%{opacity:1} 67%,100%{opacity:0} }

/* Special-keys toolbar — fixed at bottom, shown when keyboard is open */
#toolbar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: 44px;
  background: #1E2030;
  border-top: 1px solid #3A3A55;
  display: none;
  flex-direction: row;
  align-items: center;
  gap: 4px;
  padding: 4px 8px;
  overflow-x: auto;
  z-index: 100;
  -webkit-overflow-scrolling: touch;
}
#toolbar::-webkit-scrollbar { display: none; }

.tb-btn {
  background: #2A2A45;
  color: #C8C8E0;
  border: 1px solid #3A3A60;
  border-radius: 6px;
  padding: 5px 11px;
  font-size: 12px;
  font-family: inherit;
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
  -webkit-tap-highlight-color: rgba(218,119,86,0.25);
  user-select: none;
  -webkit-user-select: none;
}
.tb-btn:active { background: #3A3A60; }

.tb-btn-accent {
  background: #2E1E14;
  color: #DA7756;
  border-color: #5A3A28;
}
</style>
</head>
<body>

<div id="screen">
  <span id="output"></span><span id="input-line"><span class="prompt-char">❯ </span><span id="typed-text"></span><span id="cursor"></span></span>
</div>

<div id="toolbar">
  <button class="tb-btn tb-btn-accent" id="btn-yes">Yes</button>
  <button class="tb-btn tb-btn-accent" id="btn-no">No</button>
  <button class="tb-btn" id="btn-ctrl-c">Ctrl+C</button>
  <button class="tb-btn" id="btn-tab">Tab</button>
  <button class="tb-btn" id="btn-enter">↵</button>
  <button class="tb-btn" id="btn-up">↑</button>
  <button class="tb-btn" id="btn-down">↓</button>
  <button class="tb-btn" id="btn-esc">Esc</button>
  <button class="tb-btn" id="btn-backspace">⌫</button>
</div>

<script>
(function(){
'use strict';

// ── Palette ──────────────────────────────────────────────────────────────────

const BASE_COLORS = [
  '#21262D','#F28B82','#81C995','#FFD966','#82B4FF','#CF9FFF','#5DD6EB','#E2E8F0',
  '#555570','#FF8A80','#A8FFB0','#FFE680','#A0CFFF','#E0BAFF','#80ECFF','#FFFFFF'
];

function get256Color(n){
  if(n<16) return BASE_COLORS[n];
  if(n>=232){ const g=Math.round((n-232)*10.92); return `rgb(${g},${g},${g})`; }
  n-=16;
  const b=n%6, g=Math.floor(n/6)%6, r=Math.floor(n/36);
  const c=v=>v?v*40+55:0;
  return `rgb(${c(r)},${c(g)},${c(b)})`;
}

// ── ANSI Parser State ─────────────────────────────────────────────────────────

const MAX_SCROLLBACK = 6000;
let attrs = resetAttrs();
let savedAttrs = resetAttrs();
let savedCursor = {row:0, col:0};
let curRow = 0, curCol = 0;
let altMode = false;
let lines = [''];
let altLines = [''];

function resetAttrs(){
  return {bold:false,dim:false,italic:false,underline:false,
          blink:false,inverse:false,strike:false,fg:null,bg:null};
}

function attrsEqual(a,b){
  return a.bold===b.bold && a.dim===b.dim && a.italic===b.italic &&
         a.underline===b.underline && a.blink===b.blink &&
         a.inverse===b.inverse && a.strike===b.strike &&
         a.fg===b.fg && a.bg===b.bg;
}

function currentLines(){ return altMode ? altLines : lines; }

function ensureRow(r){
  const ls = currentLines();
  while(ls.length <= r) ls.push('');
}

// ── HTML span builder ─────────────────────────────────────────────────────────

function attrsToSpan(a, text){
  if(!text) return '';
  const cls = [];
  const style = [];
  if(a.bold)      cls.push('bold');
  if(a.dim)       cls.push('dim');
  if(a.italic)    cls.push('italic');
  if(a.underline) cls.push('underline');
  if(a.blink)     cls.push('blink');
  if(a.inverse)   cls.push('inverse');
  if(a.strike)    cls.push('strikethrough');

  if(a.fg !== null){
    if(typeof a.fg === 'number' && a.fg < 16) cls.push('f'+a.fg);
    else style.push(`color:${typeof a.fg==='number'?get256Color(a.fg):a.fg}`);
  }
  if(a.bg !== null){
    if(typeof a.bg === 'number' && a.bg < 8) cls.push('b'+a.bg);
    else style.push(`background:${typeof a.bg==='number'?get256Color(a.bg):a.bg}`);
  }

  const escapedText = text
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');

  if(!cls.length && !style.length) return escapedText;
  const c = cls.length ? ` class="${cls.join(' ')}"` : '';
  const s = style.length ? ` style="${style.join(';')}"` : '';
  return `<span${c}${s}>${escapedText}</span>`;
}

// ── Write character ───────────────────────────────────────────────────────────

function putChar(ch){
  const ls = currentLines();
  ensureRow(curRow);
  ls[curRow] += attrsToSpan(attrs, ch);
  curCol++;
}

function newLine(){
  const ls = currentLines();
  curRow++;
  curCol = 0;
  ensureRow(curRow);
  if(ls.length > MAX_SCROLLBACK){
    ls.splice(0, ls.length - MAX_SCROLLBACK);
    curRow = Math.max(0, curRow - 1);
  }
}

// ── ANSI escape parser ────────────────────────────────────────────────────────

let escState = 'normal';
let csiParams = '';
let csiIntermediate = '';
let oscBuf = '';

function processByte(ch){
  const code = ch.codePointAt(0);

  if(escState === 'normal'){
    if(code === 0x1B){ escState = 'esc'; return; }
    if(code === 0x0A){ newLine(); return; }
    if(code === 0x0D){ curCol = 0; return; }
    if(code === 0x08){ if(curCol>0) curCol--; return; }
    if(code === 0x09){
      const next = (Math.floor(curCol/8)+1)*8;
      const sp = ' '.repeat(next - curCol);
      currentLines()[curRow] = (currentLines()[curRow]||'') + attrsToSpan(attrs, sp);
      curCol = next;
      return;
    }
    if(code === 0x07) return;
    if(code < 0x20) return;
    putChar(ch);
    return;
  }

  if(escState === 'esc'){
    if(ch === '[')  { escState='csi'; csiParams=''; csiIntermediate=''; return; }
    if(ch === ']')  { escState='osc'; oscBuf=''; return; }
    if(ch === 'P' || ch === 'X' || ch === '^' || ch === '_')
                    { escState='str'; oscBuf=''; return; }
    if(ch === '7')  { savedCursor={row:curRow,col:curCol}; escState='normal'; return; }
    if(ch === '8')  { curRow=savedCursor.row; curCol=savedCursor.col; escState='normal'; return; }
    if(ch === 'M')  { if(curRow>0) curRow--; escState='normal'; return; }
    if(ch === 'c')  { resetTerminal(); escState='normal'; return; }
    if(ch === '=' || ch === '>') { escState='normal'; return; }
    escState='normal';
    return;
  }

  if(escState === 'osc'){
    if(code===0x07 || code===0x1B){ escState='normal'; return; }
    oscBuf += ch;
    return;
  }
  if(escState === 'str'){
    if(code===0x07 || code===0x1B){ escState='normal'; return; }
    return;
  }

  if(escState === 'csi'){
    if(code >= 0x30 && code <= 0x3F){ csiParams += ch; return; }
    if(code >= 0x20 && code <= 0x2F){ csiIntermediate += ch; return; }
    escState = 'normal';
    handleCSI(csiParams, csiIntermediate, ch);
  }
}

function parseParams(raw, def){
  if(!raw) return [def];
  return raw.split(';').map(s => s===''?def : parseInt(s,10));
}

function handleCSI(params, inter, final){
  switch(final){
    case 'm': handleSGR(params); break;
    case 'H': case 'f': {
      const [r,c] = parseParams(params||'1;1',1);
      curRow = Math.max(0,(r||1)-1);
      curCol = Math.max(0,(c||1)-1);
      ensureRow(curRow);
      break;
    }
    case 'A': { const n=parseParams(params,1)[0]||1; curRow=Math.max(0,curRow-n); break; }
    case 'B': { const n=parseParams(params,1)[0]||1; curRow+=n; ensureRow(curRow); break; }
    case 'C': { const n=parseParams(params,1)[0]||1; curCol+=n; break; }
    case 'D': { const n=parseParams(params,1)[0]||1; curCol=Math.max(0,curCol-n); break; }
    case 'G': { const n=parseParams(params,1)[0]||1; curCol=Math.max(0,n-1); break; }
    case 'd': { const n=parseParams(params,1)[0]||1; curRow=Math.max(0,n-1); ensureRow(curRow); break; }
    case 'J': {
      const n = parseParams(params,0)[0];
      const ls = currentLines();
      if(n===2||n===3){ ls.length=0; ls.push(''); curRow=0; curCol=0; }
      else if(n===1){ for(let i=0;i<=curRow;i++) ls[i]=''; }
      else { for(let i=curRow;i<ls.length;i++) ls[i]=''; }
      break;
    }
    case 'K': {
      const ls = currentLines();
      ensureRow(curRow);
      ls[curRow] = '';
      break;
    }
    case 'P': { const ls=currentLines(); ensureRow(curRow); ls[curRow]=''; break; }
    case 'S': { const n=parseParams(params,1)[0]||1; for(let i=0;i<n;i++) newLine(); break; }
    case 'T': { const n=parseParams(params,1)[0]||1; curRow=Math.max(0,curRow-n); break; }
    case 's': { savedCursor={row:curRow,col:curCol}; break; }
    case 'u': { curRow=savedCursor.row; curCol=savedCursor.col; break; }
    case 'h': handleMode(params, true); break;
    case 'l': handleMode(params, false); break;
    default:  break;
  }
}

function handleMode(params, enable){
  const p = params.startsWith('?') ? params.slice(1) : params;
  const codes = p.split(';').map(Number);
  for(const code of codes){
    if(code===1049||code===47||code===1047){
      if(enable && !altMode){
        altMode=true; altLines=[''];
        savedCursor={row:curRow,col:curCol};
        curRow=0; curCol=0;
      } else if(!enable && altMode){
        altMode=false;
        curRow=savedCursor.row; curCol=savedCursor.col;
      }
    }
  }
}

function handleSGR(params){
  const codes = parseParams(params,0);
  let i=0;
  while(i<codes.length){
    const c=codes[i++];
    if(c===0){ attrs=resetAttrs(); }
    else if(c===1)  attrs.bold=true;
    else if(c===2)  attrs.dim=true;
    else if(c===3)  attrs.italic=true;
    else if(c===4)  attrs.underline=true;
    else if(c===5||c===6) attrs.blink=true;
    else if(c===7)  attrs.inverse=true;
    else if(c===8)  attrs.dim=true;
    else if(c===9)  attrs.strike=true;
    else if(c===22){ attrs.bold=false; attrs.dim=false; }
    else if(c===23) attrs.italic=false;
    else if(c===24) attrs.underline=false;
    else if(c===25) attrs.blink=false;
    else if(c===27) attrs.inverse=false;
    else if(c===29) attrs.strike=false;
    else if(c>=30&&c<=37) attrs.fg=c-30;
    else if(c===38){
      if(codes[i]===5){ i++; attrs.fg=codes[i++]; }
      else if(codes[i]===2){ i++; const r=codes[i++],g=codes[i++],b=codes[i++]; attrs.fg=`rgb(${r},${g},${b})`; }
    }
    else if(c===39) attrs.fg=null;
    else if(c>=40&&c<=47) attrs.bg=c-40;
    else if(c===48){
      if(codes[i]===5){ i++; attrs.bg=codes[i++]; }
      else if(codes[i]===2){ i++; const r=codes[i++],g=codes[i++],b=codes[i++]; attrs.bg=`rgb(${r},${g},${b})`; }
    }
    else if(c===49) attrs.bg=null;
    else if(c>=90&&c<=97)   attrs.fg=c-90+8;
    else if(c>=100&&c<=107) attrs.bg=c-100+8;
  }
}

function resetTerminal(){
  lines=[''];
  altLines=[''];
  altMode=false;
  curRow=0; curCol=0;
  attrs=resetAttrs();
}

// ── Render ────────────────────────────────────────────────────────────────────

let renderQueued = false;

function scheduleRender(){
  if(renderQueued) return;
  renderQueued = true;
  requestAnimationFrame(doRender);
}

function doRender(){
  renderQueued = false;
  const ls = currentLines();
  document.getElementById('output').innerHTML = ls.join('\n');
  scrollToBottom();
}

function scrollToBottom(){
  const screen = document.getElementById('screen');
  screen.scrollTop = screen.scrollHeight;
}

// ── Input buffer ──────────────────────────────────────────────────────────────

let inputBuffer = '';

function updateInputLine(){
  document.getElementById('typed-text').textContent = inputBuffer;
  scrollToBottom();
}

function submitLine(text){
  const msg = (text !== undefined ? text : inputBuffer).trim();
  inputBuffer = '';
  ghost.value = '';
  updateInputLine();
  if(!msg) return;
  // Echo into terminal output before handing off to Android
  window.termWrite('\r\n\x1b[32m❯ ' + msg + '\x1b[0m\r\n');
  if(typeof Android !== 'undefined') Android.submitMessage(msg);
}

// ── Ghost textarea (captures Android IME input) ───────────────────────────────

const ghost = document.createElement('textarea');
ghost.id = 'ghost';
ghost.rows = 1;
ghost.style.cssText =
  'position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;' +
  'opacity:0;resize:none;border:none;outline:none;font-size:16px;';
ghost.setAttribute('autocomplete', 'off');
ghost.setAttribute('autocorrect', 'off');
ghost.setAttribute('autocapitalize', 'none');
ghost.setAttribute('spellcheck', 'false');
ghost.setAttribute('enterkeyhint', 'send');
document.body.appendChild(ghost);

let toolbarVisible = false;

ghost.addEventListener('focus', function(){
  toolbarVisible = true;
  document.getElementById('toolbar').style.display = 'flex';
  document.getElementById('screen').style.bottom = '44px';
  setTimeout(scrollToBottom, 50);
});

ghost.addEventListener('blur', function(){
  // Delay so toolbar button taps have time to re-focus ghost first
  setTimeout(function(){
    if(toolbarVisible && document.activeElement !== ghost){
      toolbarVisible = false;
      document.getElementById('toolbar').style.display = 'none';
      document.getElementById('screen').style.bottom = '0';
    }
  }, 200);
});

ghost.addEventListener('input', function(e){
  const val = ghost.value;
  // Detect newline (Enter on soft keyboard fires insertLineBreak or appends \n)
  if(val.includes('\n')){
    ghost.value = val.replace(/\n/g, '');
    inputBuffer = ghost.value;
    updateInputLine();
    submitLine();
    return;
  }
  inputBuffer = val;
  updateInputLine();
});

ghost.addEventListener('keydown', function(e){
  if(e.key === 'Enter'){
    e.preventDefault();
    submitLine();
  }
});

// ── Screen tap → open keyboard ────────────────────────────────────────────────

document.getElementById('screen').addEventListener('click', function(){
  ghost.focus();
  scrollToBottom();
});

// ── Toolbar buttons ───────────────────────────────────────────────────────────

function tbRaw(key){
  if(typeof Android !== 'undefined') Android.sendInput(key);
  ghost.focus();
}

document.getElementById('btn-yes').addEventListener('click', function(){ submitLine('y'); });
document.getElementById('btn-no').addEventListener('click', function(){ submitLine('n'); });
document.getElementById('btn-ctrl-c').addEventListener('click', function(){ tbRaw('\x03'); });
document.getElementById('btn-tab').addEventListener('click', function(){ tbRaw('\t'); });
document.getElementById('btn-enter').addEventListener('click', function(){ tbRaw('\r'); });
document.getElementById('btn-up').addEventListener('click', function(){ tbRaw('\x1b[A'); });
document.getElementById('btn-down').addEventListener('click', function(){ tbRaw('\x1b[B'); });
document.getElementById('btn-esc').addEventListener('click', function(){ tbRaw('\x1b'); });
document.getElementById('btn-backspace').addEventListener('click', function(){
  if(inputBuffer.length > 0){
    inputBuffer = inputBuffer.slice(0, -1);
    ghost.value = inputBuffer;
    updateInputLine();
  }
  ghost.focus();
});

// ── Public API ────────────────────────────────────────────────────────────────

window.termWrite = function(raw){
  for(const ch of raw) processByte(ch);
  scheduleRender();
};

window.termCopySelection = function(){
  const sel = window.getSelection();
  if(sel && sel.toString()) Android.copyText(sel.toString());
};

window.termClear = function(){
  resetTerminal();
  doRender();
};

// Legacy — kept so any existing sendInput calls from bridge still work
window.termSendInput = function(text){
  if(typeof Android !== 'undefined') Android.sendInput(text);
};

// ── Init ──────────────────────────────────────────────────────────────────────

if(typeof Android !== 'undefined') Android.onTerminalReady();

window.termWrite('\x1b[38;2;218;119;86mClaude Code\x1b[0m \x1b[2m— connecting…\x1b[0m\r\n');

})();
</script>
</body>
</html>
