<svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="cg-clip">
      <rect width="120" height="120" rx="26"/>
    </clipPath>
  </defs>

  <g clip-path="url(#cg-clip)">
    <!-- Background: near-black #0C0C0F -->
    <rect width="120" height="120" fill="#0C0C0F"/>

    <!-- Diamond outline — convergence gate -->
    <polygon points="60,10 110,60 60,110 10,60"
      fill="none" stroke="#E8834A" stroke-width="2.5" stroke-linejoin="round"/>

    <!-- Converging lines from each tip to center -->
    <line x1="60" y1="10" x2="60" y2="60"
      stroke="#E8834A" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="110" y1="60" x2="60" y2="60"
      stroke="#E8834A" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="60" y1="110" x2="60" y2="60"
      stroke="#E8834A" stroke-width="1.8" stroke-linecap="round"/>
    <line x1="10" y1="60" x2="60" y2="60"
      stroke="#E8834A" stroke-width="1.8" stroke-linecap="round"/>

    <!-- Subtle outer glow ring around center -->
    <circle cx="60" cy="60" r="13"
      fill="none" stroke="#E8834A" stroke-width="1" opacity="0.25"/>

    <!-- Amber center node — filled -->
    <circle cx="60" cy="60" r="8" fill="#E8834A"/>
  </g>
</svg>
