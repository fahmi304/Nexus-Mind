<svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="cg-clip">
      <rect width="120" height="120" rx="26"/>
    </clipPath>
  </defs>

  <g clip-path="url(#cg-clip)">
    <!-- Background -->
    <rect width="120" height="120" fill="#0C0C0F"/>

    <!-- Diagonal accent lines from inner corners to center (opacity 0.20) -->
    <line x1="20" y1="20" x2="60" y2="60" stroke="#E8834A" stroke-width="2.8" stroke-linecap="round" opacity="0.20"/>
    <line x1="100" y1="20" x2="60" y2="60" stroke="#E8834A" stroke-width="2.8" stroke-linecap="round" opacity="0.20"/>
    <line x1="20" y1="100" x2="60" y2="60" stroke="#E8834A" stroke-width="2.8" stroke-linecap="round" opacity="0.20"/>
    <line x1="100" y1="100" x2="60" y2="60" stroke="#E8834A" stroke-width="2.8" stroke-linecap="round" opacity="0.20"/>

    <!-- Cardinal lines from near-edge through diamond tips to center (opacity 0.35) -->
    <line x1="60" y1="10" x2="60" y2="60" stroke="#E8834A" stroke-width="3.5" stroke-linecap="round" opacity="0.35"/>
    <line x1="110" y1="60" x2="60" y2="60" stroke="#E8834A" stroke-width="3.5" stroke-linecap="round" opacity="0.35"/>
    <line x1="60" y1="110" x2="60" y2="60" stroke="#E8834A" stroke-width="3.5" stroke-linecap="round" opacity="0.35"/>
    <line x1="10" y1="60" x2="60" y2="60" stroke="#E8834A" stroke-width="3.5" stroke-linecap="round" opacity="0.35"/>

    <!-- Diamond outline — tips at 48dp from center (opacity 0.60) -->
    <polygon points="60,12 108,60 60,108 12,60"
      fill="none" stroke="#E8834A" stroke-width="3.5" stroke-linejoin="round" opacity="0.60"/>

    <!-- Tip dots at diamond vertices (opacity 0.50, r=4) -->
    <circle cx="60" cy="12"  r="4" fill="#E8834A" opacity="0.50"/>
    <circle cx="108" cy="60" r="4" fill="#E8834A" opacity="0.50"/>
    <circle cx="60" cy="108" r="4" fill="#E8834A" opacity="0.50"/>
    <circle cx="12" cy="60"  r="4" fill="#E8834A" opacity="0.50"/>

    <!-- Center glow halo (opacity 0.15, r=10) -->
    <circle cx="60" cy="60" r="10" fill="#E8834A" opacity="0.15"/>

    <!-- Center node solid (r=6) -->
    <circle cx="60" cy="60" r="6" fill="#E8834A"/>
  </g>
</svg>
