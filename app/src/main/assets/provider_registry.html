<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>AI Model Registry</title>
<style>
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  width: 100%; height: 100%;
  font-family: 'DM Sans', -apple-system, 'Segoe UI', sans-serif;
  background: radial-gradient(ellipse at 20% 30%, #1a0533 0%, #090714 55%, #010712 100%);
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
  color: #f0f0f0;
}

/* ── Background blobs ──────────────────────────────────────────────────── */
.blob {
  position: fixed;
  border-radius: 50%;
  pointer-events: none;
  z-index: 0;
}
.b1 {
  width: 340px; height: 340px;
  top: -80px; left: -80px;
  background: radial-gradient(circle, rgba(124,58,237,0.20) 0%, transparent 70%);
}
.b2 {
  width: 260px; height: 260px;
  bottom: -60px; right: 10%;
  background: radial-gradient(circle, rgba(6,182,212,0.20) 0%, transparent 70%);
}
.b3 {
  width: 180px; height: 180px;
  top: 40%; left: 55%;
  background: radial-gradient(circle, rgba(249,115,22,0.13) 0%, transparent 70%);
}

/* ── Page layout ───────────────────────────────────────────────────────── */
body {
  display: flex;
  flex-direction: column;
  height: 100vh;
  padding: 14px 14px 0 14px;
  gap: 12px;
}

/* ── Header ─────────────────────────────────────────────────────────────── */
#hdr {
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}
.hdr-tag {
  color: #a78bfa;
  font-family: 'Space Mono', 'Courier New', monospace;
  font-size: 10px;
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-bottom: 3px;
}
.hdr-title {
  color: #fff;
  font-size: clamp(16px, 4.5vw, 22px);
  font-weight: 600;
  letter-spacing: -0.5px;
  line-height: 1.2;
}
.hdr-sub {
  color: rgba(167,139,250,0.55);
  font-size: 11px;
  margin-top: 2px;
  font-family: 'Space Mono', 'Courier New', monospace;
}

/* ── Scrollable grid area ────────────────────────────────────────────────── */
#grid {
  flex: 1;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  grid-auto-rows: minmax(190px, auto);
  gap: 12px;
  overflow-y: auto;
  overflow-x: hidden;
  padding-bottom: 20px;
  position: relative;
  z-index: 10;
  -webkit-overflow-scrolling: touch;
}
#grid::-webkit-scrollbar { width: 3px; }
#grid::-webkit-scrollbar-track { background: transparent; }
#grid::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

/* ── Glass card ──────────────────────────────────────────────────────────── */
.glass-card {
  background: linear-gradient(135deg, rgba(255,255,255,0.07) 0%, rgba(255,255,255,0.02) 100%);
  border: 1px solid rgba(255,255,255,0.09);
  border-radius: 18px;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  box-shadow: 0 4px 24px rgba(0,0,0,0.35);
  padding: 16px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  gap: 12px;
  cursor: pointer;
  position: relative;
  overflow: hidden;
  transition: transform 0.25s cubic-bezier(0.23,1,0.32,1),
              box-shadow 0.25s ease,
              background 0.2s ease,
              border-color 0.2s ease;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
  -webkit-user-select: none;
}
.glass-card.pressed {
  transform: scale(0.96);
  background: linear-gradient(135deg, rgba(255,255,255,0.14) 0%, rgba(255,255,255,0.07) 100%);
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}

/* Per-card colored glow overlay (shown on press) */
.card-glow {
  position: absolute;
  inset: 0;
  border-radius: inherit;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.2s ease;
}
.glass-card.pressed .card-glow { opacity: 1; }

/* ── Card inner sections ─────────────────────────────────────────────────── */
.card-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}

.card-icon {
  width: 42px; height: 42px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}

.card-top-right {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 5px;
}

.card-badge {
  padding: 2px 9px;
  border-radius: 20px;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.5px;
  white-space: nowrap;
}

.card-ms {
  font-size: 10px;
  font-weight: 600;
  font-family: 'Space Mono', 'Courier New', monospace;
}

/* ── Name + category ─────────────────────────────────────────────────────── */
.card-info {}
.card-name {
  color: #fff;
  font-weight: 600;
  font-size: clamp(13px, 3.5vw, 15px);
  line-height: 1.2;
  margin-bottom: 3px;
}
.card-cat {
  color: #6b7280;
  font-size: 11px;
}

/* ── Speed / Power bars ──────────────────────────────────────────────────── */
.card-bars {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.bar-item {}
.bar-meta {
  display: flex;
  justify-content: space-between;
  margin-bottom: 4px;
}
.bar-lbl {
  color: #6b7280;
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 1px;
  font-family: 'Space Mono', 'Courier New', monospace;
}
.bar-pct {
  color: #9ca3af;
  font-size: 9px;
  font-family: 'Space Mono', 'Courier New', monospace;
}
.bar-track {
  height: 4px;
  background: rgba(255,255,255,0.06);
  border-radius: 4px;
  overflow: hidden;
}
.bar-fill {
  height: 100%;
  border-radius: 4px;
}

/* ── Footer (context / model count) ─────────────────────────────────────── */
.card-foot {
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-top: 1px solid rgba(255,255,255,0.07);
  padding-top: 10px;
}
.foot-left, .foot-right {
  display: flex;
  flex-direction: column;
  gap: 1px;
}
.foot-right { align-items: flex-end; }
.foot-lbl {
  color: #6b7280;
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 1px;
  font-family: 'Space Mono', 'Courier New', monospace;
}
.foot-val {
  color: #e5e7eb;
  font-size: 12px;
  font-weight: 700;
  font-family: 'Space Mono', 'Courier New', monospace;
}

/* ── Warning pill ────────────────────────────────────────────────────────── */
.card-warn {
  background: rgba(239,68,68,0.1);
  border: 1px solid rgba(239,68,68,0.25);
  border-radius: 8px;
  padding: 5px 9px;
  font-size: 10px;
  color: rgba(252,165,165,0.8);
  line-height: 1.4;
}

/* ── Empty state ─────────────────────────────────────────────────────────── */
.empty {
  color: rgba(167,139,250,0.4);
  font-size: 14px;
  text-align: center;
  padding: 40px;
  grid-column: 1 / -1;
}
</style>
</head>
<body>

<div class="blob b1"></div>
<div class="blob b2"></div>
<div class="blob b3"></div>

<div id="hdr">
  <p class="hdr-tag">// AI MODEL REGISTRY</p>
  <h1 class="hdr-title">Intelligence Layer</h1>
  <p class="hdr-sub" id="hdr-count">Loading providers…</p>
</div>

<div id="grid"></div>

<script>
(function(){
'use strict';

function escHtml(s){
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function hexToRgba(hex, a){
  var r=parseInt(hex.slice(1,3),16),
      g=parseInt(hex.slice(3,5),16),
      b=parseInt(hex.slice(5,7),16);
  return 'rgba('+r+','+g+','+b+','+a+')';
}

function msLabel(status){
  if(status==='GREEN')  return {emoji:'🟢', text:'MY ✓', color:'#10b981'};
  if(status==='YELLOW') return {emoji:'🟡', text:'MY ~', color:'#f59e0b'};
  return                       {emoji:'🔴', text:'MY ✗', color:'#ef4444'};
}

function createCard(p){
  var c = p.color;
  var ms = msLabel(p.malaysiaStatus);

  var card = document.createElement('div');
  card.className = 'glass-card';
  card.dataset.id = p.id;
  card.dataset.color = c;

  var glowBg = 'radial-gradient(ellipse at 10% 10%, '+hexToRgba(c,0.08)+' 0%, transparent 60%)';
  var iconBg  = hexToRgba(c, 0.14);
  var iconBd  = hexToRgba(c, 0.28);
  var badgeBg = hexToRgba(c, 0.14);
  var badgeBd = hexToRgba(c, 0.30);
  var barFill = 'linear-gradient(90deg, '+hexToRgba(c,0.45)+', '+c+')';

  var warnHtml = '';
  if(p.warning){
    var short = p.warning.length > 70 ? p.warning.substring(0,70)+'…' : p.warning;
    warnHtml = '<div class="card-warn">⚠ '+escHtml(short)+'</div>';
  }

  card.innerHTML =
    '<div class="card-glow" style="background:'+glowBg+'"></div>'+

    '<div class="card-top">'+
      '<div class="card-icon" style="background:'+iconBg+';border:1px solid '+iconBd+'">'+
        escHtml(p.emoji)+
      '</div>'+
      '<div class="card-top-right">'+
        '<span class="card-badge" style="color:'+c+';background:'+badgeBg+';border:1px solid '+badgeBd+'">'+
          escHtml(p.badge)+
        '</span>'+
        '<span class="card-ms" style="color:'+ms.color+'">'+ms.emoji+' '+ms.text+'</span>'+
      '</div>'+
    '</div>'+

    '<div class="card-info">'+
      '<div class="card-name">'+escHtml(p.name)+'</div>'+
      '<div class="card-cat">'+escHtml(p.category)+' · '+escHtml(p.rateLimit)+'</div>'+
    '</div>'+

    '<div class="card-bars">'+
      '<div class="bar-item">'+
        '<div class="bar-meta"><span class="bar-lbl">Speed</span><span class="bar-pct">'+p.speed+'%</span></div>'+
        '<div class="bar-track"><div class="bar-fill" style="width:'+p.speed+'%;background:'+barFill+'"></div></div>'+
      '</div>'+
      '<div class="bar-item">'+
        '<div class="bar-meta"><span class="bar-lbl">Power</span><span class="bar-pct">'+p.power+'%</span></div>'+
        '<div class="bar-track"><div class="bar-fill" style="width:'+p.power+'%;background:'+barFill+'"></div></div>'+
      '</div>'+
    '</div>'+

    '<div class="card-foot">'+
      '<div class="foot-left">'+
        '<span class="foot-lbl">Context</span>'+
        '<span class="foot-val">'+escHtml(p.tokens)+'</span>'+
      '</div>'+
      '<div class="foot-right">'+
        '<span class="foot-lbl">Models</span>'+
        '<span class="foot-val" style="color:'+c+'">'+p.models+'</span>'+
      '</div>'+
    '</div>'+

    warnHtml;

  // Touch: press visual on touchstart, select on touchend
  var touchMoved = false;
  card.addEventListener('touchstart', function(){
    touchMoved = false;
    this.classList.add('pressed');
    this.style.borderColor = hexToRgba(c, 0.55);
    this.style.boxShadow = '0 0 28px '+hexToRgba(c,0.16)+', 0 8px 28px rgba(0,0,0,0.45)';
  }, {passive:true});
  card.addEventListener('touchmove', function(){ touchMoved = true; }, {passive:true});
  card.addEventListener('touchend', function(){
    var self = this;
    self.classList.remove('pressed');
    self.style.borderColor = '';
    self.style.boxShadow = '';
    if(!touchMoved && typeof Android !== 'undefined'){
      Android.selectProvider(self.dataset.id);
    }
  }, {passive:true});
  card.addEventListener('touchcancel', function(){
    this.classList.remove('pressed');
    this.style.borderColor = '';
    this.style.boxShadow = '';
  }, {passive:true});

  // Desktop fallback
  card.addEventListener('mouseenter', function(){
    this.style.borderColor = hexToRgba(c, 0.55);
    this.style.boxShadow = '0 0 32px '+hexToRgba(c,0.18)+', 0 10px 32px rgba(0,0,0,0.45)';
    this.style.transform = 'translateY(-4px) scale(1.015)';
  });
  card.addEventListener('mouseleave', function(){
    this.style.borderColor = '';
    this.style.boxShadow = '';
    this.style.transform = '';
  });
  card.addEventListener('click', function(){
    if(typeof Android !== 'undefined') Android.selectProvider(this.dataset.id);
  });

  return card;
}

// ── Load providers ────────────────────────────────────────────────────────────
var raw = '[]';
try { raw = (typeof Android !== 'undefined') ? Android.getProviders() : '[]'; } catch(e){}
var providers = [];
try { providers = JSON.parse(raw); } catch(e){}

var grid = document.getElementById('grid');
var count = document.getElementById('hdr-count');

if(providers.length === 0){
  grid.innerHTML = '<div class="empty">No providers available</div>';
  count.textContent = '0 providers';
} else {
  providers.forEach(function(p){ grid.appendChild(createCard(p)); });
  count.textContent = providers.length + ' provider' + (providers.length===1?'':'s') + ' available';
}

if(typeof Android !== 'undefined') Android.onRegistryReady();

})();
</script>
</body>
</html>
